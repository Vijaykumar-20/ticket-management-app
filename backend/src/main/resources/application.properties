spring.application.name=ticket-backend
server.port=8080

# Database Configuration
# These pick up the variables you entered in Railway. 
# Spring Boot will auto-detect the Driver and Dialect based on the URL.
spring.datasource.url=${DB_URL:jdbc:h2:mem:ticketdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (Only accessible if using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Proxy Configuration (For Railway HTTPS)
server.forward-headers-strategy=framework
