spring.application.name=ticket-backend
server.port=8080

# Database Configuration (Uses Supabase PostgreSQL if env vars exist, otherwise falls back to H2)
spring.datasource.url=${DB_URL:jdbc:h2:mem:ticketdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console Configuration (Only accessible if using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Proxy Configuration (For Railway HTTPS)
server.forward-headers-strategy=framework
