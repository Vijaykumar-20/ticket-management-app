<div class="app-container animate-fade-in">
  <div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2>{{ isEditMode ? 'Edit Ticket' : 'Create New Ticket' }}</h2>
      <button class="btn btn-primary" style="background: rgba(255,255,255,0.1); box-shadow: none;" routerLink="/">
        Back to Board
      </button>
    </div>

    <form class="glass-card" [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="title">Title</label>
        <input type="text" id="title" class="form-control" formControlName="title" placeholder="Enter ticket title">
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" class="form-control" rows="5" formControlName="description" placeholder="Describe the issue..."></textarea>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label class="form-label" for="status">Status</label>
          <select id="status" class="form-control" formControlName="status">
            @for (status of statusOptions; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="priority">Priority</label>
          <select id="priority" class="form-control" formControlName="priority">
            @for (priority of priorityOptions; track priority) {
              <option [value]="priority">{{ priority }}</option>
            }
          </select>
        </div>
      </div>

      <div style="margin-top: 2rem; display: flex; justify-content: flex-end;">
        <button type="submit" class="btn btn-primary" [disabled]="ticketForm.invalid" style="min-width: 120px;">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
